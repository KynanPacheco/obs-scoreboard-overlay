<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitch Overlay Scoreboard</title>
    <script type="module" crossorigin src="/assets/index-DXAGGYNs.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Cb2WI58f.css">
  </head>
  <body>
    <div class="content" id="content">
      <div class="container-fluid bg-primary rounded-5 border border-5 border-dark text-light" id="scoreboard">
        <div class="row rounded-top-5 border-bottom border-3 border-dark">
          <h1 class="fw-bold title">Scoreboard</h1>
        </div>
        <div class="row bg-secondary">
          <div class="col-8 border-bottom border-3 border-end border-dark">
            <p class="fw-bold">Username</p>
          </div>
          <div class="col-4 border-bottom border-3 border-dark">
            <p class="fw-bold">Score</p>
          </div>
        </div>
        <div class="row bg-secondary" id="user-template">
          <div class="col-8 border-end border-bottom border-3 border-dark">
            <p class="fw-bold username">Username</p>
          </div>
          <div class="col-4 border-bottom border-3 border-dark" i>
            <p class="fw-bold score">0</p>
          </div>
        </div>
        <div class="row rounded-bottom-5 border-3 border-dark info">
          <div class="col">
            <p id="goal">First to 10 Wins!</p>
          </div>
          <div class="col">
            <p id="channel">Channel: UltraVioletRiot</p>
          </div>
          <div class="col">
            <p id="participants">Participants: 0</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
